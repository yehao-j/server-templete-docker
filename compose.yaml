name: atomicserver

services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    depends_on:
      - redis
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  redis-data:
