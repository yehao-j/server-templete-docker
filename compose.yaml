name: atomicserver

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
